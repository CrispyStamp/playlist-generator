name: Refresh Track Cache

on:
  schedule:
    - cron: '0 8 * * *'  # 8am UTC daily (midnight PST / 3am EST)
  workflow_dispatch:       # allow manual trigger from the GitHub Actions UI

permissions:
  contents: write          # needed to commit and push track_cache.json

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build track cache
        env:
          SPOTIFY_CLIENT_ID:     ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
        run: node build-track-cache.js

      - name: Commit and push if cache changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add netlify/functions/track_cache.json
          git diff --cached --quiet && echo "No changes to cache." || (
            git commit -m "chore: refresh track cache $(date -u '+%Y-%m-%d')"
            git push
          )
